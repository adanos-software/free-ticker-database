name: Daily Symbol Changes

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-symbol-changes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch symbol changes
        run: python scripts/fetch_symbol_changes.py

      - name: Validate symbol changes parser
        run: python -m pytest tests/test_fetch_symbol_changes.py -q

      - name: Push update branch
        run: |
          if git diff --quiet -- \
            data/corporate_actions/symbol_changes.csv \
            data/corporate_actions/symbol_changes.json \
            data/reports/symbol_changes_review.csv \
            data/reports/symbol_changes_review.json \
            data/reports/symbol_changes_review.md; then
            echo "No symbol-change updates."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c automation/symbol-changes
          git add \
            data/corporate_actions/symbol_changes.csv \
            data/corporate_actions/symbol_changes.json \
            data/reports/symbol_changes_review.csv \
            data/reports/symbol_changes_review.json \
            data/reports/symbol_changes_review.md
          git commit -m "Update daily symbol changes"
          git push --force origin HEAD:automation/symbol-changes

          echo "Updated automation/symbol-changes."
          echo "PR URL: https://github.com/adanos-software/free-ticker-database/compare/main...automation/symbol-changes?quick_pull=1"
